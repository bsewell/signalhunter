<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | signalhunter.io | Santa Monica, CA</title>
  <meta name="description" content="Get in touch with Signalhunter. Creative Customer Engineering based in Santa Monica, CA.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo">signalhunter.io</a>
      <button class="nav-toggle" aria-label="Toggle navigation" onclick="document.querySelector('.nav-links').classList.toggle('open')">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="customers.html">Customers</a></li>
        <li><a href="contact.html" class="active">Contact Us</a></li>
      </ul>
    </div>
  </header>

  <!-- CONTACT HERO -->
  <section class="contact-hero">
    <div class="hero-bg" style="background-image: url('images/hero-operator.jpg');"></div>
    <h1>Contact Us</h1>
    <form class="contact-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
      <h3>Let's Play</h3>
      <div class="form-row">
        <div class="form-group">
          <label for="fname">First Name</label>
          <input type="text" id="fname" name="first_name">
        </div>
        <div class="form-group">
          <label for="lname">Last Name</label>
          <input type="text" id="lname" name="last_name">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="email">Email *</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
          <label for="subject">Subject</label>
          <input type="text" id="subject" name="subject">
        </div>
      </div>
      <div class="form-group full-width">
        <label for="message">Leave us a message...</label>
        <textarea id="message" name="message"></textarea>
      </div>
      <button type="submit" class="btn-submit">Submit</button>
    </form>
  </section>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="container">
      <div class="social-links">
        <a href="#" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
        <a href="#" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
        <a href="#" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
      </div>
      <span class="copyright">&copy;2025 by signalhunter.io</span>
    </div>
  </footer>

</body>
</html>
